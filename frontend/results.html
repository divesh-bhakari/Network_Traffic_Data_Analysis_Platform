<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Results - NTDAP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
    }

    nav {
      background: #1e3a5f;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav h1 { margin: 0; font-size: 20px; }
    nav a  { color: #90caf9; text-decoration: none; margin-left: 20px; }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    h2 {
      color: #1e3a5f;
      border-left: 4px solid #1565c0;
      padding-left: 12px;
      margin: 30px 0 16px;
    }

    /* ── Stat cards ── */
    .stat-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 10px;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 20px 24px;
      min-width: 160px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
    }

    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .stat-card .value { font-size: 22px; font-weight: bold; color: #1565c0; }

    .severity-NORMAL { border-top: 4px solid #43a047; }
    .severity-MEDIUM { border-top: 4px solid #fb8c00; }
    .severity-HIGH   { border-top: 4px solid #e53935; }

    /* ── Charts ── */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
      gap: 20px;
    }

    .chart-card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
    }

    .chart-card h3 { margin: 0 0 12px; font-size: 14px; color: #555; }
    .chart-card img { width: 100%; border-radius: 4px; }

    /* ── Interpretation cards ── */
    .interp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }

    .interp-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
    }

    .interp-card h3 { margin: 0 0 10px; font-size: 14px; color: #1565c0; }
    .interp-card p  { margin: 0; font-size: 14px; color: #444; line-height: 1.7; }

    /* ── Warning box (port scan etc) ── */
    .warning-box {
      background: #fff3e0;
      border-left: 4px solid #fb8c00;
      padding: 14px 18px;
      border-radius: 6px;
      font-size: 14px;
      color: #e65100;
      margin-bottom: 16px;
    }

    /* ── Recommendation ── */
    .recommendation {
      background: #e8f5e9;
      border-left: 4px solid #43a047;
      padding: 14px 18px;
      border-radius: 6px;
      font-size: 14px;
      color: #2e7d32;
      margin-top: 20px;
    }

    .recommendation.high {
      background: #ffebee;
      border-left-color: #e53935;
      color: #b71c1c;
    }

    /* ── Tables ── */
    table {
      background: white;
      border-collapse: collapse;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      font-size: 13px;
    }

    th {
      background: #1e3a5f;
      color: white;
      padding: 10px 14px;
      text-align: left;
    }

    td {
      padding: 9px 14px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    tr:hover td { background: #f5f5f5; }

    /* Anomaly row highlight */
    tr.anomaly-row td { background: #fff8f8; }
    tr.anomaly-row:hover td { background: #ffebee; }

    /* ── IQR findings ── */
    .iqr-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 10px;
    }

    .iqr-item {
      background: white;
      border: 1px solid #ffcc80;
      border-left: 4px solid #fb8c00;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px;
      min-width: 200px;
    }

    .iqr-item .iqr-feature { font-weight: bold; color: #e65100; margin-bottom: 4px; }
    .iqr-item .iqr-detail  { color: #666; font-size: 12px; }

    /* ── Features used tag list ── */
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .tag {
      background: #e3f2fd;
      color: #1565c0;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 12px;
    }

    /* ── Top pairs table ── */
    .pairs-table { margin-bottom: 24px; }

    /* Error */
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav>
    <h1>Results</h1>
    <div>
      <a href="upload.html">⬆ New Analysis</a>
      <a href="index.html">Home</a>
    </div>
  </nav>

  <div class="container" id="content">
    <p style="color:#888; text-align:center; margin-top:60px;">Loading results...</p>
  </div>

  <script>
    const API = "http://localhost:5000";

    const raw = sessionStorage.getItem("result");

    if (!raw) {
      document.getElementById("content").innerHTML =
        '<div class="error">No results found. <a href="upload.html">Upload a file first.</a></div>';
    } else {
      buildPage(JSON.parse(raw));
    }

    function buildPage(data) {
      const s = data.statistics;
      const a = data.anomalies;
      const i = data.interpretation;
      let html = "";

      // ── File info ──────────────────────────────────────────────
      html += `<p style="color:#888; font-size:13px; margin:10px 0 4px">
        File: <strong>${data.filename}</strong>
      </p>`;

      // ── Key Statistics ─────────────────────────────────────────
      html += `<h2>📊 Key Statistics</h2>`;
      html += `<div class="stat-grid">`;
      html += statCard("Total Packets",     fmt(s.total_packets));
      html += statCard("Total Bytes",       fmtBytes(s.total_bytes));
      html += statCard("Duration",          s.capture_duration_seconds + " sec");
      html += statCard("Packets/sec",       s.packets_per_second || "—");
      html += statCard("Avg Packet Size",   s.avg_packet_size + " B");
      html += statCard("Top Protocol",      s.most_common_protocol);
      html += statCard("Top Source IP",     s.most_active_src_ip);
      html += statCard("Unique Src IPs",    s.unique_src_ips || "—");
      html += `</div>`;

      // ── Anomaly Summary ────────────────────────────────────────
      html += `<h2>🤖 Anomaly Detection</h2>`;

      // Show which features the ML used
      if (a.features_used && a.features_used.length > 0) {
        html += `<p style="font-size:13px; color:#555; margin-bottom:8px;">
          Features used by Isolation Forest:
        </p>`;
        html += `<div class="tag-list">`;
        a.features_used.forEach(f => {
          html += `<span class="tag">${f}</span>`;
        });
        html += `</div>`;
      }

      html += `<div class="stat-grid">`;
      html += statCard("Total Packets",  fmt(a.total_packets),      "severity-" + i.severity);
      html += statCard("Anomalies",      fmt(a.anomaly_count),      "severity-" + i.severity);
      html += statCard("Anomaly Rate",   a.anomaly_percentage + "%","severity-" + i.severity);
      html += statCard("Normal Packets", fmt(a.normal_count),       "severity-NORMAL");
      html += statCard("Severity",       i.severity,                "severity-" + i.severity);
      html += `</div>`;

      // ── Port scan warning ──────────────────────────────────────
      if (a.port_scan_suspects && a.port_scan_suspects.length > 0) {
        a.port_scan_suspects.forEach(s => {
          html += `<div class="warning-box">
            ⚠️ <strong>Possible Port Scan:</strong>
            ${s.src_ip} hit ${s.unique_ports_hit} unique destination ports.
            This may indicate reconnaissance activity.
          </div>`;
        });
      }

      // ── IQR Statistical Anomalies ──────────────────────────────
      if (a.stat_anomalies && a.stat_anomalies.length > 0) {
        html += `<h2>📐 Statistical Outliers (IQR Method)</h2>`;
        html += `<div class="iqr-list">`;
        a.stat_anomalies.forEach(sa => {
          html += `<div class="iqr-item">
            <div class="iqr-feature">${sa.feature}</div>
            <div class="iqr-detail">
              ${sa.outlier_count} outliers detected<br>
              Normal range: ${sa.normal_range}<br>
              Mean value: ${sa.mean}
            </div>
          </div>`;
        });
        html += `</div>`;
      }

      // ── Anomalous Packets Table (NEW) ─────────────────────────
      if (a.anomalous_packets && a.anomalous_packets.length > 0) {
        html += `<h2>🚨 Top Anomalous Packets</h2>`;
        html += `<table>
          <tr>
            <th>#</th>
            <th>Src IP</th>
            <th>Dst IP</th>
            <th>Protocol</th>
            <th>Size (bytes)</th>
            <th>Dst Port</th>
            <th>Anomaly Score</th>
          </tr>`;
        a.anomalous_packets.forEach(p => {
          html += `<tr class="anomaly-row">
            <td>${p.packet_number}</td>
            <td>${p.src_ip}</td>
            <td>${p.dst_ip}</td>
            <td>${p.protocol}</td>
            <td>${p.packet_length}</td>
            <td>${p.dst_port}</td>
            <td style="color:#e53935">${p.anomaly_score}</td>
          </tr>`;
        });
        html += `</table>`;
        html += `<p style="font-size:12px; color:#999; margin-top:6px;">
          Lower anomaly score = more unusual packet.
        </p>`;
      }

      // ── Protocol Table ─────────────────────────────────────────
      html += `<h2>🌐 Protocol Breakdown</h2>`;
      html += `<table>
        <tr><th>Protocol</th><th>Packets</th><th>Percentage</th></tr>`;
      const total = s.total_packets || 1;
      for (const [proto, count] of Object.entries(s.protocol_distribution)) {
        const pct = ((count / total) * 100).toFixed(1);
        html += `<tr>
          <td>${proto}</td>
          <td>${fmt(count)}</td>
          <td>${pct}%</td>
        </tr>`;
      }
      html += `</table>`;

      // ── Top Communication Pairs (NEW) ──────────────────────────
      if (s.top_pairs && s.top_pairs.length > 0) {
        html += `<h2>🔗 Top Communication Pairs</h2>`;
        html += `<table>
          <tr><th>Source IP</th><th>Destination IP</th><th>Packets</th></tr>`;
        s.top_pairs.forEach(p => {
          html += `<tr>
            <td>${p.src}</td>
            <td>${p.dst}</td>
            <td>${fmt(p.count)}</td>
          </tr>`;
        });
        html += `</table>`;
      }

      // ── Charts ─────────────────────────────────────────────────
      html += `<h2>📈 Visualizations</h2>`;
      html += `<div class="chart-grid">`;

      const chartTitles = {
        protocol_distribution: "Protocol Distribution",
        top_source_ips:        "Top Source IP Addresses",
        packet_size:           "Packet Size Distribution",
        traffic_timeline:      "Traffic Timeline",
        top_ports:             "Top Destination Ports",
        anomaly_scatter:       "Anomaly Detection (Size vs TTL)",
      };

      for (const [key, url] of Object.entries(data.charts)) {
        html += `<div class="chart-card">
          <h3>${chartTitles[key] || key}</h3>
          <img src="${API}${url}" alt="${key}" />
        </div>`;
      }
      html += `</div>`;

      // ── Interpretation ─────────────────────────────────────────
      html += `<h2>💬 Interpretation</h2>`;
      html += `<div class="interp-grid">`;
      html += interpCard("Summary",              i.summary);
      html += interpCard("Protocol Breakdown",   i.protocol_breakdown);
      html += interpCard("Packet Size Analysis", i.packet_size_analysis);
      html += interpCard("Anomaly Analysis",     i.anomaly_analysis);
      if (i.network_type) {
        html += interpCard("Network Type",       i.network_type);
      }
      if (i.port_scan_warning) {
        html += interpCard("⚠️ Port Scan Warning", i.port_scan_warning);
      }
      html += `</div>`;

      // ── Recommendation ─────────────────────────────────────────
      const recClass = i.severity === "HIGH" ? "recommendation high" : "recommendation";
      html += `<div class="${recClass}">
        💡 <strong>Recommendation:</strong> ${i.recommendation}
      </div>`;

      html += `<br><br>`;

      document.getElementById("content").innerHTML = html;
    }

    // ── Helpers ────────────────────────────────────────────────────

    function statCard(label, value, extraClass = "") {
      return `<div class="stat-card ${extraClass}">
        <div class="label">${label}</div>
        <div class="value">${value}</div>
      </div>`;
    }

    function interpCard(title, text) {
      if (!text) return "";
      return `<div class="interp-card">
        <h3>${title}</h3>
        <p>${text}</p>
      </div>`;
    }

    function fmt(n) {
      return n != null ? Number(n).toLocaleString() : "—";
    }

    function fmtBytes(b) {
      if (!b) return "0 B";
      if (b < 1024)        return b + " B";
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + " KB";
      return (b / 1024 / 1024).toFixed(2) + " MB";
    }
  </script>

</body>
</html>
